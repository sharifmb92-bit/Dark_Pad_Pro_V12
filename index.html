<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dark Pad Pro V12</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050a0f; color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .bg-pure-black { background-color: #000000 !important; }
        
        /* Paleta con Contraste de Texto Dinámico */
        .c-slate { background-color: #1e293b !important; color: #ffffff !important; }
        .c-zinc { background-color: #27272a !important; color: #ffffff !important; }
        .c-red { background-color: #450a0a !important; color: #ffffff !important; }
        .c-orange { background-color: #431407 !important; color: #ffffff !important; }
        .c-amber { background-color: #b45309 !important; color: #ffffff !important; }
        .c-yellow { background-color: #facc15 !important; color: #000000 !important; } /* Texto Negro */
        .c-green { background-color: #064e3b !important; color: #ffffff !important; }
        .c-emerald { background-color: #10b981 !important; color: #000000 !important; } /* Texto Negro */
        .c-sky { background-color: #0c4a6e !important; color: #ffffff !important; }
        .c-blue { background-color: #1e3a8a !important; color: #ffffff !important; }
        .c-violet { background-color: #4c1d95 !important; color: #ffffff !important; }
        .c-rose { background-color: #881337 !important; color: #ffffff !important; }

        /* Escalas de Interfaz */
        .scale-small { transform: scale(0.85); transform-origin: top center; }
        .scale-large { transform: scale(1.08); transform-origin: top center; }

        .modal-container { 
            width: 94%; max-width: 400px; max-height: 85vh; margin-top: 2rem;
            border-radius: 2.5rem; overflow: hidden; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .alarm-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 6px solid #f97316; animation: pulse-border 0.5s infinite; }
        @keyframes pulse-border { 0%, 100% { border-color: #f97316; } 50% { border-color: #ef4444; } }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" :class="[config.pureBlack ? 'bg-pure-black' : '', 'scale-' + config.uiScale]">

    <div x-show="activeAlarm" x-cloak class="alarm-overlay text-center p-6">
        <span class="material-symbols-outlined text-9xl text-orange-500 animate-bounce mb-4">notifications_active</span>
        <h2 class="text-4xl font-black text-white uppercase mb-2">¡AVISO DE TURNO!</h2>
        <p class="text-2xl text-sky-400 font-bold mb-10" x-text="activeAlarm?.titulo || 'Revisar registro'"></p>
        <button @click="stopAlarm()" class="bg-white text-black px-16 py-6 rounded-3xl font-black text-2xl shadow-2xl active:scale-95">ENTENDIDO</button>
    </div>

    <header class="p-5 pb-2 sticky top-0 z-50 bg-inherit border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-black text-orange-500 italic uppercase">Dark Pad</h1>
                <p class="text-[8px] font-black text-sky-500 uppercase">Auto-Save V12</p>
            </div>
            <button @click="ui.showSettings = true" class="p-3 bg-white/5 rounded-full"><span class="material-symbols-outlined text-sky-400">settings</span></button>
        </div>
        
        <div class="flex items-center justify-between bg-white/5 p-2 rounded-2xl border border-white/10">
            <div class="flex items-center gap-1">
                <button @click="ui.showSearch = !ui.showSearch" class="p-2"><span class="material-symbols-outlined text-sky-400 text-sm">search</span></button>
                <input x-show="ui.showSearch" x-model="search" type="text" placeholder="Buscar..." class="w-24 bg-transparent outline-none text-xs text-white">
            </div>
            <div class="flex gap-2">
                <button @click="ui.showFullCalendar = true" class="p-2 text-sky-400"><span class="material-symbols-outlined">calendar_month</span></button>
            </div>
        </div>
    </header>

    <main class="p-4 grid grid-cols-2 gap-4 h-[calc(100vh-180px)] overflow-y-auto pb-32 hide-scrollbar">
        <template x-for="nota in notasFiltradas" :key="nota.id">
            <div @click="abrirNota(nota)" 
                 class="p-5 h-44 rounded-[2rem] flex flex-col justify-between border border-white/5 shadow-lg" 
                 :class="[nota.estilo, nota.pinned ? 'ring-2 ring-orange-500' : '']">
                <div>
                    <h4 class="text-[9px] font-black uppercase opacity-60 truncate mb-1" x-text="nota.titulo || 'Sin título'"></h4>
                    <p class="font-bold leading-tight line-clamp-3 text-sm" x-text="nota.type === 'checklist' ? '✓ Tareas' : nota.texto"></p>
                </div>
                <div class="flex justify-between items-center opacity-50 text-[8px] font-black">
                    <span x-text="nota.fecha"></span>
                    <span x-show="nota.reminderTime" class="material-symbols-outlined text-[12px]">alarm</span>
                </div>
            </div>
        </template>
    </main>

    <div class="fixed bottom-10 right-6 z-[100] flex flex-col items-end gap-3">
        <div x-show="ui.showFabMenu" x-transition x-cloak class="flex flex-col gap-2 mb-2">
            <button @click="nuevaNota('checklist')" class="bg-sky-600 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-2xl">Checklist</button>
            <button @click="nuevaNota('note')" class="bg-orange-600 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-2xl">Nota</button>
        </div>
        <button @click="ui.showFabMenu = !ui.showFabMenu" class="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center shadow-2xl transition-transform" :class="ui.showFabMenu ? 'rotate-45 bg-red-500 text-white' : ''">
            <span class="material-symbols-outlined text-4xl font-black">add</span>
        </button>
    </div>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/90 z-[200] flex items-start justify-center backdrop-blur-md overflow-y-auto pt-4">
        <div class="modal-container shadow-2xl" :class="notaExpandida?.estilo">
            <div class="p-4 flex justify-between items-center bg-black/20">
                <div class="flex gap-4 items-center">
                    <button @click="cambiarSizeTextoNota()" class="flex items-center gap-1 bg-black/20 px-3 py-1 rounded-full">
                        <span class="text-xs font-black">2T</span>
                        <span class="text-[8px] opacity-50" x-text="notaExpandida?.textSize === 14 ? 'P' : (notaExpandida?.textSize === 22 ? 'G' : 'M')"></span>
                    </button>
                </div>
                <button @click="cerrarNota()" class="p-2 bg-black/30 rounded-full"><span class="material-symbols-outlined">close</span></button>
            </div>

            <div class="px-5 pt-4">
                <input x-model="notaExpandida.titulo" @input="guardar()" placeholder="Título..." class="w-full bg-black/10 p-4 rounded-2xl font-bold outline-none border border-white/5" :style="{ color: 'inherit' }">
            </div>

            <div class="flex-grow p-5 min-h-[200px]">
                <template x-if="notaExpandida?.type === 'note'">
                    <textarea x-model="notaExpandida.texto" @input="guardar()" class="w-full h-full bg-transparent outline-none resize-none font-medium" :style="{ fontSize: (notaExpandida?.textSize || 18) + 'px', color: 'inherit' }" placeholder="Escribe algo..."></textarea>
                </template>
                <template x-if="notaExpandida?.type === 'checklist'">
                    <div class="space-y-2">
                        <template x-for="(item, index) in notaExpandida.items">
                            <div class="bg-black/20 p-3 rounded-2xl flex items-center gap-3">
                                <button @click="item.done = !item.done; guardar()"><span class="material-symbols-outlined" x-text="item.done ? 'check_circle' : 'circle'"></span></button>
                                <input x-model="item.text" @input="guardar()" class="bg-transparent outline-none flex-grow" :style="{ color: 'inherit' }">
                                <button @click="notaExpandida.items.splice(index, 1); guardar()"><span class="material-symbols-outlined text-sm">delete</span></button>
                            </div>
                        </template>
                        <button @click="notaExpandida.items.push({text: '', done: false}); guardar()" class="w-full p-4 border border-dashed border-white/20 rounded-2xl text-[10px] font-black uppercase opacity-50">+ Añadir Tarea</button>
                    </div>
                </template>
            </div>

            <div x-show="ui.showAlarmPanel" class="p-5 bg-black/40 border-t border-white/10">
                <input type="time" x-model="notaExpandida.reminderTime" @change="guardar()" class="bg-white/10 border border-white/20 p-4 rounded-xl w-full text-white font-black text-2xl outline-none">
                <button @click="ui.showAlarmPanel = false" class="w-full bg-sky-600 mt-3 p-4 rounded-2xl font-black text-[10px] uppercase">Listo</button>
            </div>

            <div class="p-6 flex justify-around border-t border-white/5 bg-black/30">
                <button @click="ui.showAlarmPanel = !ui.showAlarmPanel" :class="notaExpandida?.reminderTime ? 'text-orange-500' : 'opacity-40'"><span class="material-symbols-outlined">alarm</span></button>
                <button @click="notaExpandida.pinned = !notaExpandida.pinned; guardar()" :class="notaExpandida?.pinned ? 'text-sky-500' : 'opacity-40'"><span class="material-symbols-outlined">push_pin</span></button>
                <button @click="borrarNota()" class="opacity-20"><span class="material-symbols-outlined">delete</span></button>
            </div>
        </div>
    </div>

    <div x-show="ui.showSettings" x-transition x-cloak class="fixed inset-0 bg-[#050a0f] z-[500] p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10"><h2 class="text-xl font-black uppercase italic">Configuración</h2><button @click="ui.showSettings = false" class="bg-sky-500 px-6 py-2 rounded-full text-[10px] font-black uppercase">Cerrar</button></div>
        <div class="space-y-6">
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                <p class="text-[10px] font-black uppercase opacity-40 mb-4">Zoom Interfaz</p>
                <div class="flex gap-2">
                    <button @click="config.uiScale = 'small'; guardar()" class="flex-grow p-4 rounded-2xl text-[10px] font-black" :class="config.uiScale === 'small' ? 'bg-sky-600' : 'bg-white/5'">Pequeño</button>
                    <button @click="config.uiScale = 'normal'; guardar()" class="flex-grow p-4 rounded-2xl text-[10px] font-black" :class="config.uiScale === 'normal' ? 'bg-sky-600' : 'bg-white/5'">Normal</button>
                    <button @click="config.uiScale = 'large'; guardar()" class="flex-grow p-4 rounded-2xl text-[10px] font-black" :class="config.uiScale === 'large' ? 'bg-sky-600' : 'bg-white/5'">Grande</button>
                </div>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                <button @click="exportar()" class="w-full p-4 mb-2 bg-green-600/20 rounded-2xl text-[10px] font-black flex justify-between">COPIA DE SEGURIDAD <span class="material-symbols-outlined text-sm">download</span></button>
                <button @click="$refs.fileInput.click()" class="w-full p-4 bg-orange-600/20 rounded-2xl text-[10px] font-black flex justify-between">RESTAURAR DATOS <span class="material-symbols-outlined text-sm">upload</span></button>
                <input type="file" x-ref="fileInput" class="hidden" @change="importar($event)">
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10 flex justify-between items-center">
                <span class="font-bold text-sm">Modo Negro Puro (AMOLED)</span>
                <button @click="config.pureBlack = !config.pureBlack; guardar()" class="w-12 h-6 rounded-full p-1" :class="config.pureBlack ? 'bg-sky-500' : 'bg-white/10'"><div class="w-4 h-4 bg-white rounded-full transition-transform" :class="config.pureBlack ? 'translate-x-6' : ''"></div></button>
            </div>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null, search: '', activeAlarm: null,
                ui: { showSearch: false, showSettings: false, showAlarmPanel: false, showFullCalendar: false, showFabMenu: false },
                config: { pureBlack: false, uiScale: 'normal' },
                estilos: ['c-slate', 'c-zinc', 'c-red', 'c-orange', 'c-amber', 'c-yellow', 'c-green', 'c-emerald', 'c-sky', 'c-blue', 'c-violet', 'c-rose'],

                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v12')) || [];
                    this.config = JSON.parse(localStorage.getItem('darkpad_conf_v12')) || this.config;
                    
                    // Comprobación de Alarmas
                    setInterval(() => {
                        const ahora = new Date();
                        const h = ahora.getHours().toString().padStart(2, '0') + ':' + ahora.getMinutes().toString().padStart(2, '0');
                        this.notas.forEach(n => {
                            if (n.reminderTime === h) {
                                this.activeAlarm = n;
                                n.reminderTime = null; 
                                this.guardar();
                                this.vibrarFuerte();
                            }
                        });
                    }, 30000);
                },

                vibrarFuerte() {
                    if (window.navigator.vibrate) {
                        window.navigator.vibrate([500, 100, 500, 100, 500, 100, 800, 100, 800]);
                    }
                },

                stopAlarm() { this.activeAlarm = null; if (window.navigator.vibrate) window.navigator.vibrate(0); },

                nuevaNota(tipo) {
                    const n = { 
                        id: Date.now(), 
                        type: tipo, 
                        titulo: '', 
                        texto: '', 
                        textSize: 18,
                        items: tipo === 'checklist' ? [{text:'', done:false}] : [], 
                        fecha: new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}), 
                        estilo: this.estilos[Math.floor(Math.random() * this.estilos.length)], 
                        pinned: false, 
                        reminderTime: null 
                    };
                    this.notas.unshift(n);
                    this.guardar();
                    this.abrirNota(n);
                    this.ui.showFabMenu = false;
                },

                cambiarSizeTextoNota() {
                    const sizes = [14, 18, 22];
                    let current = sizes.indexOf(this.notaExpandida.textSize || 18);
                    this.notaExpandida.textSize = sizes[(current + 1) % sizes.length];
                    this.guardar();
                },

                abrirNota(n) { this.notaExpandida = n; this.ui.showAlarmPanel = false; },
                cerrarNota() { this.guardar(); this.notaExpandida = null; },
                
                // Función de auto-guardado que se puede llamar en cada pulsación
                guardar() { 
                    localStorage.setItem('darkpad_v12', JSON.stringify(this.notas)); 
                    localStorage.setItem('darkpad_conf_v12', JSON.stringify(this.config)); 
                },

                borrarNota() { if(confirm("¿Borrar definitivamente?")) { this.notas = this.notas.filter(n => n.id !== this.notaExpandida.id); this.cerrarNota(); } },
                exportar() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(this.notas)], {type:'application/json'})); a.download = 'backup_darkpad.json'; a.click(); },
                importar(e) { const r = new FileReader(); r.onload = (f) => { try { this.notas = JSON.parse(f.target.result); this.guardar(); location.reload(); } catch(e) { alert("Archivo no válido"); } }; r.readAsText(e.target.files[0]); },
                
                get notasFiltradas() {
                    return this.notas.filter(n => (n.texto + n.titulo).toLowerCase().includes(this.search.toLowerCase()))
                                     .sort((a,b) => b.pinned - a.pinned || b.id - a.id);
                }
            }
        }
    </script>
</body>
</html>
